- name: Common setup for all Kubernetes nodes
  hosts: kubernetes_master, kubernetes_workers
  become: true
  tasks:
    - name: Update apt cache and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist
      tags: always

    - name: Install common packages
      apt:
        name: "{{ item }}"
        state: present
      loop:
        - apt-transport-https
        - ca-certificates
        - curl
        - gnupg-agent
        - software-properties-common
        - vim
        - git
      tags: always

    - name: Disable swap
      shell: swapoff -a
      when: ansible_swaptoggle.rc == 0 # Check if swap is enabled
      tags: always

    - name: Comment out swap entries in /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^(\s*)([^#]+\s+swap\s+sw\s+.*)$'
        replace: '#\2'
      tags: always

    - name: Enable kernel modules for Kubernetes
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter
      tags: always

    - name: Add sysctl settings for Kubernetes
      copy:
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1
        dest: /etc/sysctl.d/99-kubernetes-cri.conf
        owner: root
        group: root
        mode: '0644'
      tags: always

    - name: Apply sysctl settings without reboot
      command: sysctl --system
      tags: always