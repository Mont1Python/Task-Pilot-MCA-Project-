apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
  labels:
    app: todo-frontend
spec:
  replicas: 2 # Scale as needed
  selector:
    matchLabels:
      app: todo-frontend
  template:
    metadata:
      labels:
        app: todo-frontend
    spec:
      containers:
        - name: frontend
          image: YOUR_DOCKER_HUB_USERNAME/todo-frontend:latest # REPLACE with your image
          ports:
            - containerPort: 80
          env:
            - name: REACT_APP_API_URL
              value: http://todo-backend:3001 # Frontend talks to backend K8s service
          resources: # Define resource requests/limits
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: todo-frontend
  labels:
    app: todo-frontend
spec:
  selector:
    app: todo-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort # Or LoadBalancer if on cloud, or Ingress below